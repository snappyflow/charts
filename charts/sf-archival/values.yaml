global:
  hive:
    internal:
      enabled: true
    external:
      enabled: false
      # Below fields must be changed when external hive.external.enabled is true
      userName: ubuntu
      host: 127.0.0.1
      port: 10000
      auth: NONE

  postgresql:
    host: host
    postgresqlDatabase: new_archival
    postgresqlUsername: archive
    postgresqlPassword: archive123
    servicePort: 5432

  secrets:
    gcs:
      enable: false
      secret: XX
      key: XX.json
    aws:
      enable: true
      AWS_DEFAULT_REGION: us-west-2
      # Below line would be true when using IAM roles
      use_iam_role: false
      # Below is the ARN of the IAM role
      AWS_IAM_ROLE_ARN: arn:aws:iam::XXXX:role/XXXX
      # Below details are needed when we are NOT using IAM roles
      AWS_ACCESS_KEY_ID: XXXX
      AWS_SECRET_ACCESS_KEY: XXXX

  kafkaBrokers: ""

  snappyflowDatapath:
    enabled: true
    releaseName: sf-datapath

  snappyflowProjectLabel: snappyflow/projectname
  snappyflowAppLabel: snappyflow/appname

  snappyflowProjectName: "dummy-project"
  snappyflowAppName: "dummy-app"

  imagePullSecrets:
  - name: xxxx

# Pod priority class value
priority: 100

dataset-controller:
  billing-service:
    url: 127.0.0.1:8000/api/v1/records/
    scheme: https

spark-manager:
  jobserver:
    sparkProperties:
      # S3 bucket with aws prefix/folder for spark event logs e.g., for bucket location of s3://sparkhs/spark-hs configure as configured below
      logDirectory: encsfsparkhs/spark-hs
  infrastructure:
    Kubernetes:
      enabled: true
      image: snappyflowml/spark-compact-aws:beta
      preference: 1
      cluster: "k8s://kubernetes.default.svc:443"
      numExecutors: 5
      jobResources:
        cpu:
          requests:
            executor: 0.2
            driver: 0.2
          limits:
            executor: 0.4
            driver: 0.5
        memory:
          executor: 1024m
          driver: 1024m
    EcsFargate:
      enabled: false
      image: ahmed3465/spark-on-fargate:v10
      preference: 1
      cluster: sf-archival-compaction
      numExecutors: 2
      iamRole: arn:aws:iam::159750416379:role/Dev-Archival-presto_hive
      taskSubnet: subnet-09a6fcdc2b614e300
      taskSecurityGroup: sg-03b8db147f1b7b423
      jobResources:
        cpu: 2048
        memory: 8192

spark-history-server:
  enabled: false
  s3:
    # Below config should be exactly same as spark-manager.jobserver.sparkProperties.logDirectory
    logDirectory: encsfsparkhs/spark-hs
